# HOTFIX 2026-07-05 — Serve pre-built dist/ from repo, disable rebuild
# The Railway rebuild via esbuild produces an incomplete dist/index.cjs
# missing critical routes (send-daily-digest, eqrs-v31-ecotox-tool, admin/stats).
# Restored dist/index.cjs from commit 1b2e26e which contains all 33 API routes.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --production --ignore-scripts --prefer-offline || npm install --production --ignore-scripts"]

[phases.build]
cmds = ["echo 'Build phase skipped — using pre-built dist/ from repo'"]

[start]
cmd = "node dist/index.cjs"
